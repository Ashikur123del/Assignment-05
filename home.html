<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pyoopn</title>

    <!-- font-awsome  -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"  />

    <!-- google-font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
    
    <!-- tailwind and dayUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>


 <header class="p-6 border-b shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
    <div class="flex items-center gap-3">
        <i class="fa-brands fa-github text-4xl"></i>
        <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
    </div>
    <div class="join">
        <input id="search-input" type="text" class="input input-bordered join-item" placeholder="Search issues...">
        <button id="search-btn" class="btn btn-primary join-item"> <i class="fa-solid fa-plus"></i> New issu</button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto p-6">
  <div class="p-3 bg-white border border-gray-200  rounded-lg shadow-sm my-5">
    <div class="tabs tabs-boxed bg-white border border-gray-200 p-1 w-fit rounded-lg shadow-sm">
    <a class="tab tab-active bg-blue-700 text-white rounded-md px-6" onclick="handleFilter('all', this)">All</a>
    <a class="tab text-gray-500 rounded-md px-6" onclick="handleFilter('open', this)">Open</a>
    <a class="tab text-gray-500 rounded-md px-6" onclick="handleFilter('closed', this)">Closed</a>
  </div>
  </div>

  <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-lg border border-gray-200">
      <div class="flex items-center gap-3">
          <div class="bg-purple-100 p-2 rounded-full"> <img src="./assets/Aperture.png" alt=""></div>
          <div>
            <h2 id="issue-count" class="text-lg font-bold">0 Issues</h2>
            <p class="text-xs text-gray-400">Track and manage your project issues</p>
          </div>
      </div>
      <div class="flex items-center gap-4 text-xs font-semibold">
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500"></span> Open</span>
          <span class="flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-purple-500"></span> Closed</span>
      </div>
  </div>

  <div id="issue-container" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
</main>

<dialog id="issue_modal" class="modal">
  <div class="modal-box max-w-lg p-6"> <h3 id="modal-title" class="font-bold text-xl text-gray-900 mb-4"></h3>
    <div id="modal-desc" class="py-2 space-y-4">
        </div>
    <div class="modal-action mt-6">
      <form method="dialog">
        <button class="btn btn-primary w-full md:w-auto px-10">Close</button>
      </form>
    </div>
  </div>
</dialog>

   <script src="home.js"></script>
  </body>
</html>
